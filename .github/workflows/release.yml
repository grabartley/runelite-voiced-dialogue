name: Release

# workflow_dispatch is the single deploy. It computes the next version from the latest v* tag and the
# dispatched bump (patch/minor/major), writes it into runelite-plugin.properties (the single source
# the Hub reads when it builds from source), commits that back to main, tags it v<version>, then
# builds and publishes the plugin jars under that tag. The version is never hand-maintained. The
# plugin is Cloud-only: no engine bundles, no per-OS assets, no manifest. The PR build/test gate lives
# in ci.yml.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - alpha
          - beta
          - stable
        default: alpha

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check formatting (Spotless)
        run: ./gradlew spotlessCheck

      - name: Build and run tests
        run: ./gradlew build

      - name: Publish unit test report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"
          detailed_summary: true
          include_passed: true

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          LATEST_TAG=$(git describe --tags --abbrev=0 --match='v*' 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Previous: ${LATEST_VERSION}"
          echo "New:      ${NEW_VERSION}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Pin version and tag the release commit
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # runelite-plugin.properties is the version the Hub builds from, so the tagged commit must
          # carry it. Write it, commit it back to main, and tag that commit v<version>.
          sed -i -E "s/^version=.*/version=${NEW_VERSION}/" runelite-plugin.properties
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runelite-plugin.properties
          git commit -m "chore: release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin HEAD:main
          git push origin "v${NEW_VERSION}"

      - name: Build shadow JAR
        run: ./gradlew shadowJar

      - name: Generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh api \
            --method POST \
            /repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="v${NEW_VERSION}" \
            --jq .body > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::warning::Generated changelog is empty"
            echo "No changes recorded for this release." > release-notes.md
          fi

          echo "--- Changelog ---"
          cat release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          if [ "${{ inputs.release_type }}" != "stable" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v${NEW_VERSION}" \
            --title "Voiced Dialogue v${NEW_VERSION}" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            build/libs/*.jar
