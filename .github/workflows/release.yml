name: Release

# workflow_dispatch is the single deploy: it reads the source-pinned version (the committed
# src/main/resources/plugin-version.txt, via `./gradlew printVersion`), runs the gate, builds the
# thin + shadow jars, then publishes ONE GitHub release under one v<version> tag carrying the jars.
# The Hub builds its own jar from this source at the tagged commit, so it carries the same version.
# The plugin is Cloud-only: no engine bundles, no per-OS assets, no manifest. The PR build/test gate
# lives in ci.yml.
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - alpha
          - beta
          - stable
        default: alpha

permissions:
  contents: write

jobs:
  # ---------- Deploy: read source version, gate, build thin + shadow jars ----------
  plugin:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check formatting (Spotless)
        run: ./gradlew spotlessCheck

      - name: Build and run tests
        run: ./gradlew build

      - name: Publish unit test report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"
          detailed_summary: true
          include_passed: true

      - name: Read source-pinned version
        id: version
        run: |
          VERSION=$(./gradlew -q printVersion | tail -1 | tr -d '[:space:]')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read the project version from src/main/resources/plugin-version.txt"
            exit 1
          fi
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "::error::Refusing to release a SNAPSHOT version ($VERSION). Set a release version in src/main/resources/plugin-version.txt on the commit you are releasing."
            exit 1
          fi
          echo "Releasing version: ${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build shadow JAR
        run: ./gradlew shadowJar

      - name: Upload plugin jars
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jar
          path: build/libs/*.jar

  # ---------- Deploy: one tagged release carrying the plugin jars ----------
  publish:
    name: Publish release
    needs: plugin
    runs-on: ubuntu-latest
    env:
      VERSION: v${{ needs.plugin.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release shadow JAR
        uses: actions/download-artifact@v4
        with:
          name: plugin-jar
          path: plugin-dist

      - name: Generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            /repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name=${{ env.VERSION }} \
            --jq .body > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::warning::Generated changelog is empty"
            echo "No changes recorded for this release." > release-notes.md
          fi

          echo "--- Changelog ---"
          cat release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          if [ "${{ inputs.release_type }}" != "stable" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          # Re-runnable: create the release if missing, otherwise refresh its assets.
          if gh release view "${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Release exists, refreshing assets"
          else
            gh release create "${{ env.VERSION }}" \
              --title "Voiced Dialogue ${{ env.VERSION }}" \
              --notes-file release-notes.md \
              $PRERELEASE_FLAG
          fi
          # Attach both plugin jars (thin + shadow). A per-file loop (not find -exec) so any failed
          # upload fails the step.
          while IFS= read -r -d '' f; do
            gh release upload "${{ env.VERSION }}" "$f" --clobber \
              || { echo "::error::release asset upload failed for $f"; exit 1; }
          done < <(find plugin-dist -type f -name '*.jar' -print0)
