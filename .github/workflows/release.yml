name: Release

# workflow_dispatch is the single deploy. It computes the next version from the latest v* tag and the
# dispatched bump (patch/minor/major), writes it into runelite-plugin.properties (the single source
# the Hub reads when it builds from source), commits that back to main, tags it v<version>, then
# builds and publishes the plugin jars under that tag. The version is never hand-maintained. The
# plugin is Cloud-only: no engine bundles, no per-OS assets, no manifest. The PR build/test gate lives
# in ci.yml.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - alpha
          - beta
          - stable
        default: alpha

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check formatting (Spotless)
        run: ./gradlew spotlessCheck

      - name: Build and run tests
        run: ./gradlew build

      - name: Publish unit test report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"
          detailed_summary: true
          include_passed: true

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          # The last deployed release tag, or empty on the very first release. It seeds the version
          # bump and, in the changelog step, is the baseline the notes are computed against.
          PREV_TAG=$(git describe --tags --abbrev=0 --match='v*' 2>/dev/null || true)
          BASE_VERSION=${PREV_TAG#v}
          BASE_VERSION=${BASE_VERSION:-0.0.0}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Previous tag: ${PREV_TAG:-<none>}"
          echo "New:          ${NEW_VERSION}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Pin version and tag the release commit
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # runelite-plugin.properties is the version the Hub builds from, so the tagged commit must
          # carry it. Write it, commit the change back to main only if it actually differs (the
          # computed version can already match, e.g. the first release after the file was set by
          # hand), then always tag the current commit (which now carries the version) and push it.
          sed -i -E "s/^version=.*/version=${NEW_VERSION}/" runelite-plugin.properties
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runelite-plugin.properties
          if git diff --cached --quiet; then
            echo "runelite-plugin.properties already at ${NEW_VERSION}; tagging without a commit"
          else
            git commit -m "chore: release v${NEW_VERSION}"
            git push origin HEAD:main
          fi
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

      - name: Build shadow JAR
        run: ./gradlew shadowJar

      - name: Generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.version.outputs.version }}
          PREV_TAG: ${{ steps.version.outputs.prev_tag }}
        run: |
          set -euo pipefail
          # Notes for everything deployed since the last release tag. On the first release there is
          # no previous tag, so previous_tag_name is omitted and GitHub includes every commit on
          # main up to this release.
          ARGS=(-f tag_name="v${NEW_VERSION}")
          if [ -n "${PREV_TAG}" ]; then
            ARGS+=(-f previous_tag_name="${PREV_TAG}")
            echo "Changelog: ${PREV_TAG}..v${NEW_VERSION}"
          else
            echo "Changelog: all commits on main (no previous release tag)"
          fi
          gh api \
            --method POST \
            /repos/${{ github.repository }}/releases/generate-notes \
            "${ARGS[@]}" \
            --jq .body > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::warning::Generated changelog is empty"
            echo "No changes recorded for this release." > release-notes.md
          fi

          echo "--- Changelog ---"
          cat release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          if [ "${{ inputs.release_type }}" != "stable" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v${NEW_VERSION}" \
            --title "Voiced Dialogue v${NEW_VERSION}" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            build/libs/*.jar
