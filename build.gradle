plugins {
	id 'java'
	id 'com.diffplug.spotless' version '6.25.0'
}

repositories {
	mavenLocal()
	maven {
		url = 'https://repo.runelite.net'
		content {
			includeGroupByRegex("net\\.runelite.*")
		}
	}
	mavenCentral()
}

def runeLiteVersion = 'latest.release'

dependencies {
	// RuneLite provides Gson and OkHttp at runtime; the plugin uses the injected instances (Hub
	// rules) and only needs them at compile time, so the client dependency covers both.
	compileOnly group: 'net.runelite', name:'client', version: runeLiteVersion

	compileOnly 'org.projectlombok:lombok:1.18.30'
	annotationProcessor 'org.projectlombok:lombok:1.18.30'

	// The plugin is Cloud-only: dialogue is voiced through OpenRouter over the injected OkHttp
	// client. The jar ships no synthesis engine, no native libraries, and no model.

	testImplementation 'junit:junit:4.12'
	// Method-level data providers for case-driven tests (@Parameters), so repeated case assertions
	// reuse one test body and each case is reported as its own row.
	testImplementation 'pl.pragmatists:JUnitParams:1.1.1'
	testImplementation 'org.mockito:mockito-core:5.12.0'
	// OkHttp's MockWebServer drives the Azure backend's HTTP path in tests with no live key. The
	// version tracks the okhttp the RuneLite client pulls in (3.14.x) so the client and server agree.
	testImplementation 'com.squareup.okhttp3:mockwebserver:3.14.9'
	testImplementation group: 'net.runelite', name:'client', version: runeLiteVersion
	testImplementation group: 'net.runelite', name:'jshell', version: runeLiteVersion
}

group = 'com.grahambartley'

// runelite-plugin.properties is the single source of truth for the version: the Hub reads its
// `version` when it builds from source, and build.gradle reads the same field here so the jar and the
// release tag always agree with what the Hub ships. It is written by the release workflow (from the
// dispatched bump), so the version is never hand-maintained.
def pluginProperties = new Properties()
file('runelite-plugin.properties').withInputStream { pluginProperties.load(it) }
version = pluginProperties.getProperty('version')?.trim()

tasks.register('printVersion') {
	doLast {
		println version
	}
}

tasks.withType(JavaCompile).configureEach {
	options.encoding = 'UTF-8'
	options.release.set(17)
}

// The Plugin Hub's build=standard compiles the plugin's main sources at Java 11 (its injected
// build.gradle hard-sets options.release=11 and discards ours). Pin our own main compile to 11 too
// so CI catches any Java 12+ syntax or API here rather than only when the Hub build fails. Tests
// keep 17: the Hub never builds them.
tasks.named('compileJava') {
	options.release.set(11)
}

tasks.register('shadowJar', Jar) {
	dependsOn configurations.testRuntimeClasspath
	manifest {
		attributes('Main-Class': 'com.grahambartley.VoicedDialoguePluginRunner', 'Multi-Release': true)
	}

	duplicatesStrategy = DuplicatesStrategy.EXCLUDE
	from sourceSets.main.output
	from sourceSets.test.output
	from {
		configurations.testRuntimeClasspath.collect { file ->
			file.isDirectory() ? file : zipTree(file)
		}
	}

	exclude 'META-INF/INDEX.LIST'
	exclude 'META-INF/*.SF'
	exclude 'META-INF/*.DSA'
	exclude 'META-INF/*.RSA'
	exclude '**/module-info.class'

	group = BasePlugin.BUILD_GROUP
	archiveClassifier.set('shadow')
	archiveFileName.set("${rootProject.name}-${project.version}-all.jar")
}

tasks.withType(JavaExec).configureEach {
	jvmArgs += [
			"--add-exports=java.desktop/com.apple.eawt=ALL-UNNAMED"
	]
}

spotless {
	java {
		googleJavaFormat('1.17.0')
		target 'src/**/*.java'
	}
}

tasks.register('installGitHook', Copy) {
	from("$rootDir/scripts/pre-commit")
	into("$rootDir/.git/hooks")
	fileMode = 0755
}

tasks.named('build') {
	dependsOn 'spotlessCheck'
}